<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Peru 2026 Presidential Election — District Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .title {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 1000;
      background: rgba(255,255,255,0.94);
      padding: 14px 16px;
      border-radius: 10px;
      max-width: 390px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .title h1 {
      margin: 0 0 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .title p {
      margin: 0;
      font-size: 12px;
      color: #444;
      line-height: 1.35;
    }

    .legend {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      line-height: 1.35;
      font-size: 12px;
    }

    .legend h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
    }

    .legend div {
      margin-bottom: 4px;
    }

    .swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
      border: 1px solid #999;
    }

    .leaflet-tooltip {
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="title">
    <h1>Peru 2026 Presidential Election</h1>
    <p>District winner map. Colour indicates winning party; darker shades indicate stronger winning vote share.</p>
    <p><strong>Source:</strong> ONPE district results; district geometry: INEI 2025.</p>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map', {
      zoomControl: true
    }).setView([-9.2, -75.0], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const partyColors = {
      "JUNTOS POR EL PERÚ": "#2ca25f",
      "FUERZA POPULAR": "#f28e2b",
      "PODEMOS PERÚ": "#e84393",
      "AHORA NACIÓN - AN": "#8e44ad",
      "PARTIDO CÍVICO OBRAS": "#74c476",
      "RENOVACIÓN POPULAR": "#2b6cb0",
      "PARTIDO DEL BUEN GOBIERNO": "#f2c94c",
      "PARTIDO PAÍS PARA TODOS": "#b46ecb",
      "ALIANZA PARA EL PROGRESO": "#9e9e9e"
    };

    function blendWithWhite(hex, strength) {
      const c = hex.replace("#", "");
      const r = parseInt(c.substring(0,2), 16);
      const g = parseInt(c.substring(2,4), 16);
      const b = parseInt(c.substring(4,6), 16);

      const rr = Math.round(255 * (1 - strength) + r * strength);
      const gg = Math.round(255 * (1 - strength) + g * strength);
      const bb = Math.round(255 * (1 - strength) + b * strength);

      return `rgb(${rr},${gg},${bb})`;
    }

    function getColor(feature) {
      const p = feature.properties;
      const party = p.winner_party;
      const share = parseFloat(p.winner_share);

      if (!party || isNaN(share)) return "#eeeeee";

      const base = partyColors[party] || "#cfcfcf";

      let strength = (share - 15) / (60 - 15);
      strength = Math.max(0.25, Math.min(1.0, strength));

      return blendWithWhite(base, strength);
    }

    function style(feature) {
      return {
        fillColor: getColor(feature),
        weight: 0.35,
        opacity: 1,
        color: "#ffffff",
        fillOpacity: 0.88
      };
    }

    function fmt(x) {
      if (x === null || x === undefined || x === "" || isNaN(parseFloat(x))) return "—";
      return parseFloat(x).toFixed(1);
    }

    function onEachFeature(feature, layer) {
      const p = feature.properties;

      const html = `
        <strong>${p.DISTRITO || p.inei_distrito || p.onpe_distrito || "Distrito"}</strong><br>
        ${p.PROVINCIA || ""}, ${p.DEPARTAMEN || ""}<br><br>
        <strong>Winner:</strong> ${p.winner_candidate || "—"}<br>
        <strong>Party:</strong> ${p.winner_party || "—"}<br>
        <strong>Winner share:</strong> ${fmt(p.winner_share)}%<br>
        <strong>Runner-up:</strong> ${p.runner_up_candidate || "—"}<br>
        <strong>Margin:</strong> ${fmt(p.winner_margin)} pp<br>
        <strong>Fujimori - Sánchez:</strong> ${fmt(p.fujimori_minus_sanchez)} pp
      `;

      layer.bindTooltip(html, {
        sticky: true,
        direction: "auto",
        opacity: 0.95
      });

      layer.on({
        mouseover: function(e) {
          e.target.setStyle({
            weight: 1.8,
            color: "#111",
            fillOpacity: 0.95
          });
          e.target.bringToFront();
        },
        mouseout: function(e) {
          geojson.resetStyle(e.target);
        }
      });
    }

    let geojson;

    fetch("09_peru_presidential_district_results_deptfixed.geojson")
      .then(response => response.json())
      .then(data => {
        geojson = L.geoJSON(data, {
          style: style,
          onEachFeature: onEachFeature
        }).addTo(map);

        map.fitBounds(geojson.getBounds());
      });

    const legend = L.control({position: "bottomright"});

    legend.onAdd = function() {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <h3>Winner</h3>
        <div><span class="swatch" style="background:#2ca25f"></span> JPP</div>
        <div><span class="swatch" style="background:#f28e2b"></span> Fuerza Popular</div>
        <div><span class="swatch" style="background:#e84393"></span> Podemos Perú</div>
        <div><span class="swatch" style="background:#8e44ad"></span> Ahora Nación</div>
        <div><span class="swatch" style="background:#74c476"></span> Obras</div>
        <div><span class="swatch" style="background:#2b6cb0"></span> Renovación Popular</div>
        <div><span class="swatch" style="background:#f2c94c"></span> Buen Gobierno</div>
        <div><span class="swatch" style="background:#b46ecb"></span> País Para Todos</div>
        <div><span class="swatch" style="background:#9e9e9e"></span> APP</div>
        <hr>
        <div>Darker = stronger district vote share</div>
      `;
      return div;
    };

    legend.addTo(map);
  </script>
</body>
</html>
